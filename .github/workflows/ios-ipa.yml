name: Build Signed iOS IPA

on:
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build signed IPA
    runs-on: macos-15

    env:
      APP_NAME: Facezero
      SCHEME: Facezero
      CONFIGURATION: Release
      EXPORT_METHOD: ${{ vars.EXPORT_METHOD || 'development' }}
      IOS_BUNDLE_ID: ${{ vars.IOS_BUNDLE_ID || 'com.tekdev.facezero' }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}

    steps:
      - name: Validate signing secrets
        run: |
          set -e
          missing=0

          for name in APPLE_TEAM_ID KEYCHAIN_PASSWORD P12_PASSWORD BUILD_CERTIFICATE_BASE64 BUILD_PROVISION_PROFILE_BASE64; do
            value="${!name}"
            if [ -z "$value" ]; then
              echo "Missing required secret: $name"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo ""
            echo "This signed workflow needs Apple Developer signing secrets."
            echo "For the SideStore route, run the workflow named: Build SideStore IPA"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Apply bundle identifier
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import os
          path = Path('project.yml')
          text = path.read_text()
          text = text.replace('PRODUCT_BUNDLE_IDENTIFIER: com.tekdev.facezero', f"PRODUCT_BUNDLE_IDENTIFIER: {os.environ['IOS_BUNDLE_ID']}")
          path.write_text(text)
          PY

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Prepare signing assets
        run: |
          set -e
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > "$HOME/Library/MobileDevice/Provisioning Profiles/Facezero.mobileprovision"

      - name: Archive app
        run: |
          xcodebuild archive \
            -project Facezero.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -archivePath "$PWD/build/$APP_NAME.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            clean archive

      - name: Create export options
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>$EXPORT_METHOD</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          PLIST

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath "$PWD/build/$APP_NAME.xcarchive" \
            -exportPath "$PWD/build/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Facezero-IPA
          path: build/export/*.ipa
          if-no-files-found: error

name: Facezero
options:
  bundleIdPrefix: com.tekdev
  deploymentTarget:
    iOS: "17.0"
targets:
  Facezero:
    type: application
    platform: iOS
    sources:
      - Facezero
    info:
      path: Facezero/Info.plist
      properties:
        CFBundleDisplayName: Facezero
        NSCameraUsageDescription: Camera access is required for the live AR preview.
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tekdev.facezero
        INFOPLIST_FILE: Facezero/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SWIFT_VERSION: 5.9
        DEVELOPMENT_TEAM: ""
